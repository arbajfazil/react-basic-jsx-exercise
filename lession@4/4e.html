<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>react 01 question</title>
    <style>
        .inputBox{
             margin-bottom: 5px;
            border-radius: 3px;
            border:0.1px solid black;
            padding: 5px;
        }
        button{
            background-color: rgb(3, 66, 255);
            border: none;
            margin-right: 10px;
            margin-top: 2px;
            border-radius: 3px;
            color: white;
            padding: 5px 8px;
            cursor: pointer;
            margin-left: 5px;
        }
    </style>
</head>
<body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
     function App(){
        const [butn,setButn] = React.useState(true)
        const [inpt,setInpt] = React.useState(false)
        function btn(){
            setButn(butn?false:true)
            setInpt(!inpt)
        }
        return(
            <>
                <input type={butn?'text':'password'} placeholder='Password' className='inputBox'/>
                <button onClick={btn}>{butn?'Hide':'Show'}</button>
            </>
        )
     }


      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
      </script>
</body>
</html>
