<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <style>
      
      .send-btn{
        background-color: rgb(25,135,84);
        color: white;
        border: none;
        padding: 12px 20px;
        font-size: 15px;
        border-radius: 10px;
        margin-left: 10px;
        cursor: pointer;
      }
      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size:15px ;
        flex-grow: 1;
      }
      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }
      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
      
      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items:start;
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      
      }
      .chat-message-text{
      
        background-color: rgb(238,238,238);
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 10px;
        max-width: 300px;
        padding: 12px 15px;
        margin: 5px;
        margin-bottom: 20px;
      }
      body{
        font-family: Arial;
        margin: 0;
        padding: 0;
      }
      .chat-message-container{
        flex-grow:1 ;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }
      
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function ChatInput({chatMessages,setChatMessage}){
       const [inputText,setInputText] = React.useState('');
        function saveInputTex(event){
          setInputText(event.target.value)
        }
        function handleKeyDown(event) {
          if (event.key === 'Enter') {
            sendMessage();
          }
        }
        
        function sendMessage(){
          const newChatMessages =[
            ...chatMessages,
            {
              message:inputText,
              sender:'user',
              id:crypto.randomUUID()
            }
          ] 
          setChatMessage(newChatMessages)
          const response = Chatbot.getResponse(inputText);
          setChatMessage([
            ...newChatMessages,
            {
              message:response,
              sender:'robot',
              id:crypto.randomUUID()
            }
          ])
          setInputText('')
        }
        return (
          <div className='chat-input-container'>
            <input 
              placeholder="you can ask only three question" 
              size="30" 
              onChange={saveInputTex}
              value={inputText}
              className='chat-input'
              onKeyDown={handleKeyDown}
            />
            <button onClick={sendMessage}
            className='send-btn'
            >Send</button>
          </div>
        )
      }
      function ChatMessage({message, sender}){
        // const message = props.message
        // const sender = props.sender
        // const {message,sender} = props;

        // if(sender === 'robot'){
        //      return(
        //       <div>
        //         <img src="robot.png" width='50' />
        //         {message}
        //      </div>
        //      )
        // }

        return(
          <div className={
            sender==='user'?'chat-message-user':'chat-message-robot'
          }>
            {sender === 'robot' && (
              <img src="robot.png" width='50' />
            )}
            <div className='chat-message-text'>
              {message}
            </div>
            
            {sender === 'user' && (
               <img src='user.png' width='50' />
            )}
          </div>
        )
      }
      function ChatMsg({chatMessages}){
           const chatMessagesRef = React.useRef(null)
           React.useEffect(()=>{
           const containerElem = chatMessagesRef.current
           if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
           }
           },[chatMessages]);
         return(
           <div className='chat-message-container'
           ref={chatMessagesRef}
           >
              
              {
                chatMessages.map((elem)=>{
                  return(
                    <ChatMessage 
                      message = {elem.message}
                      sender = {elem.sender}
                      key = {elem.id}
                    />
                  )
                })
              }
           </div>
        )
      }

      function App(){
        const [chatMessages,setChatMessage] = React.useState([])
        // const chatMessages = array[0];
        // const setChatMessage = array[1];

        return(
          <div className='app-container'>
            
            <ChatMsg 
              chatMessages={chatMessages}
            />
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessage={setChatMessage}

            />
          </div>
        )
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
