<!DOCTYPE html>
<html>
  <head>
    <title>chatbot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function ChatInput({chatMessages,setChatMessage}){
       const [inputText,setInputText] = React.useState('');
        function saveInputTex(event){
          setInputText(event.target.value)
        }
        function sendMessage(){
          const newChatMessages =[
            ...chatMessages,
            {
              message:inputText,
              sender:'user',
              id:crypto.randomUUID()
            }
          ] 
          setChatMessage(newChatMessages)
          const response = Chatbot.getResponse(inputText);
          setChatMessage([
            ...newChatMessages,
            {
              message:response,
              sender:'robot',
              id:crypto.randomUUID()
            }
          ])
          setInputText('')
        }
        return (
          <>
            <input 
              placeholder="you can ask only three question" 
              size="30" 
              onChange={saveInputTex}
              value={inputText}
            />
            <button onClick={sendMessage}>Send</button>
          </>
        )
      }
      function ChatMessage({message, sender}){
        // const message = props.message
        // const sender = props.sender
        // const {message,sender} = props;

        // if(sender === 'robot'){
        //      return(
        //       <div>
        //         <img src="robot.png" width='50' />
        //         {message}
        //      </div>
        //      )
        // }

        return(
          <div>
            {sender === 'robot' && (
              <img src="robot.png" width='50' />
            )}
            {message}
            {sender === 'user' && (
               <img src='user.png' width='50' />
            )}
          </div>
        )
      }
      function ChatMsg({chatMessages}){
         return(
           <>
              
              {
                chatMessages.map((elem)=>{
                  return(
                    <ChatMessage 
                      message = {elem.message}
                      sender = {elem.sender}
                      key = {elem.id}
                    />
                  )
                })
              }
           </>
        )
      }

      function App(){
        const [chatMessages,setChatMessage] = React.useState([{
          message: 'hellow chatbot',
          sender: 'user',
          id:'id1'
        },{
          message:'hello ! How Can I Help You',
          sender:'robot',
          id:'id2'
        },{
          message:'what is current Date',
          sender:'user',
          id:'id3'
        },{
          message:'current dat is july 8 2026',
          sender:'robot',
          id:'id4'
        }])
        // const chatMessages = array[0];
        // const setChatMessage = array[1];

        return(
          <>
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessage={setChatMessage}

            />
            <ChatMsg 
              chatMessages={chatMessages}
            />
          </>
        )
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
